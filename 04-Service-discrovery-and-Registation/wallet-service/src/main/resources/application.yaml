server:
  port: 8081

spring:

  application:
    name: wallet-service

  datasource:
    url: jdbc:mysql://localhost:3306/walletdb
    username: walletuser
    password: walletpass


  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

management:

  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.hibernate.SQL: debug

springdoc:
  swagger-ui:
    path: /swagger-ui.html

identity-service:
  base-url: localhost://8081/api/v1


#eureka configuration

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}