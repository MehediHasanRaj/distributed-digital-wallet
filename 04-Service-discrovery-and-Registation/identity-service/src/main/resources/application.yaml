server:
  port: 8082

spring:

  application:
    name: identity-service

  datasource:
    url: jdbc:mysql://localhost:3307/identitydb
    username: appuser
    password: apppassword

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

management:

  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.hibernate.SQL: debug