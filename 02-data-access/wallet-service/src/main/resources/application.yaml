spring:
  application:
    name: wallet-service




  datasource:
    url: jdbc:mysql://localhost:3306/walletdb
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info



wallet:
  currency: GBP
  maximum-transfer: 5000
  minimum-balance: 0